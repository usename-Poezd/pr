services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-polls}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"], interval: 5s, timeout: 5s, retries: 10}
  app:
    build: .
    ports: ["8080:8080"]
    depends_on: {db: {condition: service_healthy}}
volumes:
  postgres-data:
